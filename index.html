<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frequency Garden</title>
  <meta name="description" content="An audio-reactive 3D particle garden — visualize sound through a WebGL particle system that breathes with bass, mids, and highs. Mic input, file playback, or built-in oscillator.">
  <meta name="theme-color" content="#000508">
  <meta property="og:title" content="Frequency Garden">
  <meta property="og:description" content="An audio-reactive 3D particle garden — visualize sound through a WebGL particle system.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://frequency.pr0xy.dev">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Frequency Garden">
  <meta name="twitter:description" content="An audio-reactive 3D particle garden — visualize sound through a WebGL particle system.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="hint">frequency garden</div>
  <div id="canvas-container"></div>

  <div id="controls">
    <div class="controls-top">
      <button id="play-btn" aria-label="Play/Pause">
        <span id="play-icon">▶</span>
      </button>
      <div class="file-upload-wrapper">
        <input type="file" id="audio-file" accept="audio/*">
        <div class="file-upload-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM21 16a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
          </svg>
          <span id="file-label">drop audio file or click to browse</span>
        </div>
      </div>
      <div class="vu-meter" aria-hidden="true">
        <div class="vu-bar" style="height:6px"></div>
        <div class="vu-bar" style="height:6px"></div>
        <div class="vu-bar" style="height:6px"></div>
        <div class="vu-bar" style="height:6px"></div>
        <div class="vu-bar" style="height:6px"></div>
        <div class="vu-bar" style="height:6px"></div>
        <div class="vu-bar" style="height:6px"></div>
        <div class="vu-bar" style="height:6px"></div>
      </div>
    </div>

    <div id="osc-controls">
      <div class="osc-section">
        <span class="osc-label">freq</span>
        <input type="range" id="osc-freq" min="20" max="4000" step="1" value="220" style="width:80px">
        <span class="slider-value" id="osc-freq-label">220 Hz</span>
      </div>
      <div class="osc-section">
        <span class="osc-label">wave</span>
        <div class="wave-btns">
          <button class="wave-btn active" data-wave="sine">sin</button>
          <button class="wave-btn" data-wave="triangle">tri</button>
          <button class="wave-btn" data-wave="square">sqr</button>
          <button class="wave-btn" data-wave="sawtooth">saw</button>
        </div>
      </div>
    </div>

    <div class="sliders-row">
      <div class="slider-group">
        <label for="sensitivity">sensitivity</label>
        <input type="range" id="sensitivity" min="0.5" max="20" step="0.1" value="8">
        <span class="slider-value" id="sensitivity-label">1.2</span>
      </div>
      <div class="slider-group">
        <label for="decay">decay</label>
        <input type="range" id="decay" min="0.7" max="0.99" step="0.01" value="0.88">
        <span class="slider-value" id="decay-label">0.92</span>
      </div>
      <div class="slider-group">
        <label for="bloom">bloom</label>
        <input type="range" id="bloom" min="0.5" max="4" step="0.1" value="1.4">
        <span class="slider-value" id="bloom-label">1.8</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
